<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Chaiiwala</title>
    <link rel="manifest" href="/chaiiwala-bird/manifest.json">
    <meta name="theme-color" content="#ff6b35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flappy Chaiiwala">
    <link rel="apple-touch-icon" href="/chaiiwala-bird/img/burger.png">
    <link rel="stylesheet" href="game.css">
    <script src="game.js"></script>
</head>
<body>
    <canvas id="board"></canvas>


    <button id="settings-btn" class="settings-btn" onclick="toggleSettings()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 1v6m0 6v6m5.2-14.8l-4.2 4.2m-3 3l-4.2 4.2M23 12h-6m-6 0H1m14.8 5.2l-4.2-4.2m-3-3l-4.2-4.2"></path>
      </svg>
    </button>


    <div id="settings-panel" class="settings-panel">
      <div class="settings-content">
        <h2 class="settings-title">SETTINGS</h2>
        
        <div class="setting-item">
          <label class="setting-label">
            <span>THEME</span>
            <div class="toggle-container">
              <span class="toggle-option">🌙 DARK</span>
              <label class="toggle-switch">
                <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
                <span class="toggle-slider"></span>
              </label>
              <span class="toggle-option">☀️ LIGHT</span>
            </div>
          </label>
        </div>


        <button class="close-settings-btn" onclick="toggleSettings()">CLOSE</button>
      </div>
    </div>

    <div id="game-over-overlay" style="display: none;">
      <img id="game-over-bg" src="img/game_over_bg.png" alt="Game Over" class="game-over-bg">
      <div class="game-over-content">
        <div id="new-high-score" class="new-high-score">🎉 NEW HIGH SCORE! 🎉</div>
        <div class="score-display">
          <div class="current-score">Score: <span id="final-score">0</span></div>
          <div class="high-score">Best: <span id="display-high-score">0</span></div>
        </div>
        <button id="replay-btn" class="replay-button">REPLAY</button>
      </div>
    </div>
</body>
</html>
