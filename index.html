<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flappy Chaiiwala</title>
    <link rel="stylesheet" href="fonts/fonts.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <link rel="manifest" href="/chaiiwala-bird/manifest.json">
    <meta name="theme-color" content="#ff6b35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flappy Chaiiwala">
    <link rel="apple-touch-icon" href="/chaiiwala-bird/img/burger.png">
</head>
<body>

<div id="bg"></div>

<button id="settings-btn" class="settings-btn" onclick="toggleSettings()">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="3"></circle>
    <path d="M12 1v6m0 6v6m5.2-14.8l-4.2 4.2m-3 3l-4.2 4.2M23 12h-6m-6 0H1m14.8 5.2l-4.2-4.2m-3-3l-4.2-4.2"></path>
  </svg>
</button>

<button id="leaderboard-btn" class="leaderboard-btn" onclick="openLeaderboard()">🏆</button>

<div id="settings-panel" class="settings-panel">
  <div class="settings-content">
    <h2 class="settings-title">SETTINGS</h2>
    <div class="setting-item">
      <label class="setting-label">
        <span>THEME</span>
        <div class="toggle-container">
          <span class="toggle-option">🌙 DARK</span>
          <label class="toggle-switch">
            <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-option">☀️ LIGHT</span>
        </div>
      </label>
    </div>
    <button class="close-settings-btn" onclick="toggleSettings()">CLOSE</button>
  </div>
</div>

<div class="particle" style="left:10%; animation-duration:8s; animation-delay:0s;">☕</div>
<div class="particle" style="left:25%; animation-duration:11s; animation-delay:2s;">🍵</div>
<div class="particle" style="left:50%; animation-duration:9s; animation-delay:4s;">☕</div>
<div class="particle" style="left:70%; animation-duration:13s; animation-delay:1s;">🫖</div>
<div class="particle" style="left:85%; animation-duration:10s; animation-delay:6s;">☕</div>

<div id="start-screen">
  <button class="start-btn" onclick="openNameEntry()">▶ PLAY</button>
</div>

<!-- NAME ENTRY MODAL -->
<div id="name-overlay">
  <div class="char-modal name-modal">
    <div class="modal-title">ENTER YOUR NAME</div>
    <div class="name-input-wrap">
      <input
        type="text"
        id="player-name-input"
        class="player-name-input"
        placeholder="YOUR NAME"
        maxlength="16"
        autocomplete="off"
        spellcheck="false"
      />
      <div class="name-hint">Max 16 characters</div>
    </div>
    <button class="confirm-btn" onclick="confirmName()">✔ CONFIRM</button>
  </div>
</div>

<!-- CHARACTER SELECTION OVERLAY -->
<div id="char-overlay">
  <div class="char-modal">
    <div class="modal-title">CHOOSE YOUR CHARACTER</div>
    <div class="char-row">
      <button class="arrow-btn" onclick="prevChar()">◀</button>
      <div class="char-card">
        <img id="char-img" src="img/tea.png" alt="Character Image">
        <div class="char-name" id="char-name">CHAI</div>
      </div>
      <button class="arrow-btn" onclick="nextChar()">▶</button>
    </div>
    <div class="dots" id="dots"></div>
    <button class="confirm-btn" onclick="confirmChar()">✔ CONFIRM</button>
  </div>
</div>

<!-- LEADERBOARD OVERLAY -->
<div id="leaderboard-overlay">
  <div class="char-modal leaderboard-modal">
    <div class="modal-title">🏆 LEADERBOARD</div>
    <div id="leaderboard-list" class="leaderboard-list">
      <div class="lb-loading">Loading...</div>
    </div>
    <button class="confirm-btn" onclick="closeLeaderboard()">✖ CLOSE</button>
  </div>
</div>

<script src="/sw-register.js"></script>
</body>
</html>
